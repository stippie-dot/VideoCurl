name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version from tag
        id: vars
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Clean release output
        shell: pwsh
        run: |
          if (Test-Path release) {
            Remove-Item -Path "release/*.exe","release/*.blockmap","release/latest.yml" -Force -ErrorAction SilentlyContinue
          }

      - name: Build installer
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release metadata
        shell: pwsh
        run: |
          $version = '${{ steps.vars.outputs.version }}'
          $expectedExe = "Video.Cull.Setup.$version.exe"
          $expectedBlockmap = "Video.Cull.Setup.$version.exe.blockmap"
          $latestPath = "release/latest.yml"

          if (-not (Test-Path "release/$expectedExe")) {
            throw "Missing expected installer: release/$expectedExe"
          }

          if (-not (Test-Path "release/$expectedBlockmap")) {
            throw "Missing expected blockmap: release/$expectedBlockmap"
          }

          if (-not (Test-Path $latestPath)) {
            throw "Missing latest.yml"
          }

          $latest = Get-Content $latestPath -Raw
          if ($latest -notmatch "path:\s*$([regex]::Escape($expectedExe))") {
            throw "latest.yml path does not match expected installer name $expectedExe"
          }

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | tr -d '\r')
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Video Cull ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: false
          files: |
            release/Video.Cull.Setup.${{ steps.vars.outputs.version }}.exe
            release/Video.Cull.Setup.${{ steps.vars.outputs.version }}.exe.blockmap
            release/latest.yml
